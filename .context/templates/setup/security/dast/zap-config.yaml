# OWASP ZAP Automation Framework Configuration
# Auto-generated by SETUP Agent
# Ref: Template L

# Version: 1.0.0
# Date: 2026-01-26
# Changelog:
#   - 1.0.0: Initial configuration

env:
  contexts:
    - name: "Default Context"
      urls:
        - "${TARGET_URL}"
      includePaths:
        - "${TARGET_URL}.*"
      excludePaths:
        - ".*logout.*"
        - ".*signout.*"
      authentication:
        method: "manual"
      sessionManagement:
        method: "cookie"
  parameters:
    failOnError: true
    failOnWarning: false
    progressToStdout: true

jobs:
  - type: passiveScan-config
    parameters:
      maxAlertsPerRule: 10
      scanOnlyInScope: true

  - type: spider
    parameters:
      maxDuration: 10
      maxDepth: 5
      maxChildren: 10

  - type: spiderAjax
    parameters:
      maxDuration: 10
      maxCrawlDepth: 5
      numberOfBrowsers: 2

  - type: passiveScan-wait
    parameters:
      maxDuration: 5

  - type: activeScan
    parameters:
      maxRuleDurationInMins: 10
      maxScanDurationInMins: 30
      addQueryParam: false
      defaultPolicy: "Default Policy"
      delayInMs: 0
      handleAntiCSRFTokens: true
      injectPluginIdInHeader: false
      scanHeadersAllRequests: true
      threadPerHost: 2

  - type: report
    parameters:
      template: "traditional-html"
      reportDir: "security/dast/reports"
      reportFile: "zap-report-${TIMESTAMP}"
      reportTitle: "DAST Scan Report"
      reportDescription: "OWASP ZAP Dynamic Application Security Testing"
