# ============================================================================
# Governance Check on PR — AWS CodeBuild buildspec
# ============================================================================
# Generated by Agent: SETUP | Framework: mi-AI-Factory
# Platform: AWS CodeBuild
#
# Runs the governance gates that must pass before a PR can merge to main:
#
#   - scripts/check-adr-constitution-sync.sh — single-source-of-truth
#     gate. Bypass via [adr-backfill] commit message marker.
#
# Wire this buildspec via a CodeBuild project triggered by CodeStar / CodePipeline
# on PullRequest events targeting main. Set CODEBUILD_WEBHOOK_BASE_REF in the
# webhook config so it surfaces as an env var (or pass via override).
# ============================================================================

version: 0.2

env:
  variables:
    BASE_REF: "main"

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - apt-get update -qq && apt-get install -y -qq bash git
  pre_build:
    commands:
      - echo "Resolving base ref..."
      - 'EFFECTIVE_BASE="${CODEBUILD_WEBHOOK_BASE_REF:-$BASE_REF}"'
      - 'EFFECTIVE_BASE="${EFFECTIVE_BASE#refs/heads/}"'
      - 'echo "Base branch: $EFFECTIVE_BASE"'
      - git fetch origin "$EFFECTIVE_BASE" --depth=200 || git fetch origin "$EFFECTIVE_BASE"
  build:
    commands:
      - chmod +x scripts/check-adr-constitution-sync.sh
      - bash scripts/check-adr-constitution-sync.sh "origin/$EFFECTIVE_BASE"
