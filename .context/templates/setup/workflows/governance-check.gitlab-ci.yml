# ============================================================================
# Governance Check on Merge Request — GitLab CI
# ============================================================================
# Generated by Agent: SETUP | Framework: mi-AI-Factory
# Platform: GitLab CI
#
# Runs the governance gates that must pass before an MR can merge to main:
#
#   - scripts/check-adr-constitution-sync.sh — single-source-of-truth
#     gate. Bypass via [adr-backfill] commit message marker.
#
# To wire this into an existing .gitlab-ci.yml, include this job under the
# `stages: [governance]` stage (or merge into your existing stage layout)
# and ensure pipelines run on merge_request events.
# ============================================================================

stages:
  - governance

governance-check:
  stage: governance
  image: alpine:3.20
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
  before_script:
    - apk add --no-cache bash git python3
    - git fetch origin "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
  script:
    - chmod +x scripts/check-adr-constitution-sync.sh
    - bash scripts/check-adr-constitution-sync.sh "origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
  variables:
    GIT_DEPTH: 0
