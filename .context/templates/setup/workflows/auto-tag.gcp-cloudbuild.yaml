# ============================================================================
# Auto-Tag on Merge to Main — GCP Cloud Build
# ============================================================================
# Generated by Agent: SETUP | Framework: mi-AI-Factory
# Platform: GCP Cloud Build
#
# Create a Cloud Build trigger on pushes to the main branch.
# Console: Cloud Build → Triggers → Create Trigger → Push to branch: ^main$
# Calls scripts/auto-tag.sh for SemVer tagging.
#
# Required:
#   - Cloud Build service account needs Source Repository Writer role
#     (or access to push tags to your GitHub/Bitbucket mirror).
#   - If GitHub: connect via Cloud Build GitHub App and grant push access.
#   - Secret Manager: store git credentials if needed.
# ============================================================================

steps:
  # Step 1: Fetch full history and tags (Cloud Build does shallow clone)
  - name: 'gcr.io/cloud-builders/git'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        git fetch --unshallow 2>/dev/null || true
        git fetch --tags

  # Step 2: Check if merge commit
  - name: 'gcr.io/cloud-builders/git'
    id: 'check-merge'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        COMMIT_MSG=$(git log -1 --pretty=format:"%s")
        if ! echo "$$COMMIT_MSG" | grep -qiE "^Merge pull request|\(#"; then
          echo "⚠️ Not a merge commit. Will skip auto-tag."
          echo "true" > /workspace/skip_tag
        else
          echo "false" > /workspace/skip_tag
        fi

  # Step 3: Run auto-tag
  - name: 'gcr.io/cloud-builders/git'
    id: 'auto-tag'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        SKIP=$(cat /workspace/skip_tag)
        if [ "$$SKIP" = "true" ]; then
          echo "Skipping — not a merge commit."
          exit 0
        fi

        git config user.name "cloudbuild-auto-tag"
        git config user.email "cloudbuild@noreply.google.com"

        chmod +x scripts/auto-tag.sh
        OUTPUT=$$(bash scripts/auto-tag.sh --apply --ci 2>&1)
        echo "$$OUTPUT"
        NEW_TAG=$$(echo "$$OUTPUT" | grep -oP '(?<=TAG=)\S+')

        if [ -n "$$NEW_TAG" ]; then
          echo "✅ Tag $$NEW_TAG created and pushed"
        fi

options:
  logging: CLOUD_LOGGING_ONLY

tags:
  - 'auto-tag'
  - 'semver'
