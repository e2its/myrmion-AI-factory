# ============================================================================
# Auto-Tag & Release on Merge to Main — GitHub Actions
# ============================================================================
# Generated by Agent: SETUP | Framework: mi-AI-Factory
# Platform: GitHub Actions
#
# Triggers on PR merge to main. Calls scripts/auto-tag.sh for SemVer tagging
# and creates a GitHub Release with categorized release notes.
# ============================================================================

name: Auto-Tag & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  auto-tag:
    if: >-
      github.event_name == 'push' &&
      (startsWith(github.event.head_commit.message, 'Merge pull request') ||
       contains(github.event.head_commit.message, '(#'))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Auto-tag with SemVer
        id: tag
        run: |
          chmod +x scripts/auto-tag.sh
          # Capture output for release notes
          OUTPUT=$(scripts/auto-tag.sh --apply --ci 2>&1)
          echo "$OUTPUT"
          # Extract NEW_TAG from script output
          NEW_TAG=$(awk -F= '/^TAG=/{print $2; exit}' <<< "$OUTPUT")
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.tag.outputs.new_tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_TAG="${{ steps.tag.outputs.new_tag }}"
          # Generate release notes from commits
          LAST_TAG=$(git describe --tags --abbrev=0 "${NEW_TAG}^" 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s (%h)")
          else
            LOG=$(git log "${LAST_TAG}..${NEW_TAG}" --pretty=format:"- %s (%h)")
          fi

          BREAKING=$(echo "$LOG" | grep -iE "^- feat!:|BREAKING CHANGE:" || true)
          FEATURES=$(echo "$LOG" | grep -iE "^- feat(\(.*\))?:" | grep -viE "^- feat!:" || true)
          FIXES=$(echo "$LOG" | grep -iE "^- fix(\(.*\))?:" || true)
          OTHER=$(echo "$LOG" | grep -iE "^- (chore|ci|docs|refactor|perf|test|style)(\(.*\))?:" || true)

          NOTES="## ${NEW_TAG}"$'\n\n'
          [ -n "$BREAKING" ] && NOTES+="### 🚨 Breaking Changes"$'\n'"$BREAKING"$'\n\n'
          [ -n "$FEATURES" ] && NOTES+="### ✨ Features"$'\n'"$FEATURES"$'\n\n'
          [ -n "$FIXES" ] && NOTES+="### 🐛 Bug Fixes"$'\n'"$FIXES"$'\n\n'
          [ -n "$OTHER" ] && NOTES+="### 🔧 Maintenance"$'\n'"$OTHER"$'\n\n'
          NOTES+="---"$'\n'"*Auto-generated from conventional commits.*"

          gh release create "$NEW_TAG" \
            --title "Release $NEW_TAG" \
            --notes "$NOTES" \
            --latest

          echo "✅ GitHub Release $NEW_TAG created"
