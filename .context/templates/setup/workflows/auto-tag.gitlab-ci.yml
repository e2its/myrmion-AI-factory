# ============================================================================
# Auto-Tag on Merge to Main — GitLab CI
# ============================================================================
# Generated by Agent: SETUP | Framework: mi-AI-Factory
# Platform: GitLab CI
#
# Include this job in your .gitlab-ci.yml or use `include:` directive.
# Calls scripts/auto-tag.sh on merge to main for SemVer tagging.
# Creates a GitLab Release via the API.
#
# Required CI/CD Variables (Settings → CI/CD → Variables):
#   GITLAB_TOKEN: Personal/project token with api + write_repository scope
# ============================================================================

stages:
  - auto-tag

auto-tag:
  stage: auto-tag
  image: alpine:latest
  only:
    - main
  except:
    - tags
  before_script:
    - apk add --no-cache git bash curl jq
    - git config user.name "gitlab-ci[bot]"
    - git config user.email "gitlab-ci[bot]@users.noreply.gitlab.com"
    - git remote set-url origin "https://oauth2:${GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    - git fetch --tags
  script:
    - chmod +x scripts/auto-tag.sh
    - |
      # Run auto-tag and capture new tag
      OUTPUT=$(bash scripts/auto-tag.sh --apply --ci 2>&1)
      echo "$OUTPUT"
      NEW_TAG=$(awk -F= '/^TAG=/{print $2; exit}' <<< "$OUTPUT")

      if [ -z "$NEW_TAG" ]; then
        echo "⚠️ No new tag created. Skipping release."
        exit 0
      fi

      echo "🏷️ Creating GitLab Release for $NEW_TAG"

      # Generate release notes
      LAST_TAG=$(git describe --tags --abbrev=0 "${NEW_TAG}^" 2>/dev/null || echo "")
      if [ -z "$LAST_TAG" ]; then
        LOG=$(git log --pretty=format:"- %s (%h)")
      else
        LOG=$(git log "${LAST_TAG}..${NEW_TAG}" --pretty=format:"- %s (%h)")
      fi

      DESCRIPTION="## ${NEW_TAG}\n\n${LOG}\n\n---\n*Auto-generated from conventional commits.*"

      # Create GitLab release via API (using jq for safe JSON construction)
      jq -n \
        --arg tag "$NEW_TAG" \
        --arg name "Release $NEW_TAG" \
        --arg desc "$(echo -e "$DESCRIPTION")" \
        '{tag_name: $tag, name: $name, description: $desc}' | \
      curl --fail --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
        --header "Content-Type: application/json" \
        --data @- \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases"

      echo "✅ GitLab Release $NEW_TAG created"
