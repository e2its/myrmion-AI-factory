# ============================================================================
# Auto-Tag on Merge to Main — Bitbucket Pipelines
# ============================================================================
# Generated by Agent: SETUP | Framework: myrmion-AI-factory
# Platform: Bitbucket Pipelines
#
# Add this step to your bitbucket-pipelines.yml under the main branch.
# Calls scripts/auto-tag.sh on merge to main for SemVer tagging.
#
# Required: Repository Settings → Access Keys or Pipeline SSH Keys
#   with write access for tag pushing.
# ============================================================================

pipelines:
  branches:
    main:
      - step:
          name: Auto-Tag with SemVer
          image: atlassian/default-image:3
          script:
            - git fetch --tags
            - chmod +x scripts/auto-tag.sh
            - |
              # Check if this is a merge commit
              COMMIT_MSG=$(git log -1 --pretty=format:"%s")
              if ! echo "$COMMIT_MSG" | grep -qiE "^Merged in|Pull request #|\(#"; then
                echo "⚠️ Not a merge commit. Skipping auto-tag."
                exit 0
              fi

              OUTPUT=$(bash scripts/auto-tag.sh --apply --ci 2>&1)
              echo "$OUTPUT"
              NEW_TAG=$(awk -F= '/^TAG=/{print $2; exit}' <<< "$OUTPUT")

              if [ -n "$NEW_TAG" ]; then
                echo "✅ Tag $NEW_TAG created and pushed"
              fi
