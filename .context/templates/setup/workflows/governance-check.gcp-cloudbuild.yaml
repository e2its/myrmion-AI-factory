# ============================================================================
# Governance Check on PR — GCP Cloud Build
# ============================================================================
# Generated by Agent: SETUP | Framework: mi-AI-Factory
# Platform: GCP Cloud Build
#
# Runs the governance gates that must pass before a PR can merge to main:
#
#   - scripts/check-adr-constitution-sync.sh — single-source-of-truth
#     gate. Bypass via [adr-backfill] commit message marker.
#
# Wire this cloudbuild.yaml via a Cloud Build trigger filtered to pull-request
# events targeting `main`. The trigger surfaces _BASE_BRANCH as a substitution.
# ============================================================================

substitutions:
  _BASE_BRANCH: 'main'

steps:
  - name: 'gcr.io/cloud-builders/git'
    id: 'fetch-base'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        git fetch origin "${_BASE_BRANCH}"
        git rev-parse "origin/${_BASE_BRANCH}" >/dev/null

  - name: 'gcr.io/cloud-builders/git'
    id: 'governance-check'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        chmod +x scripts/check-adr-constitution-sync.sh
        bash scripts/check-adr-constitution-sync.sh "origin/${_BASE_BRANCH}"

options:
  logging: CLOUD_LOGGING_ONLY
