# ============================================================================
# Auto-Tag on Merge to Main — Azure DevOps
# ============================================================================
# Generated by Agent: SETUP | Framework: mi-AI-Factory
# Platform: Azure DevOps
#
# Add this as a separate pipeline or include in your azure-pipelines.yml.
# Calls scripts/auto-tag.sh on merge to main for SemVer tagging.
#
# Required: Allow pipeline to push tags (Project Settings → Repositories →
#   Security → Build Service → Contribute + Create Tag = Allow)
# ============================================================================

trigger:
  branches:
    include:
      - main

pr: none

pool:
  vmImage: 'ubuntu-latest'

steps:
  - checkout: self
    fetchDepth: 0
    fetchTags: true
    persistCredentials: true

  - task: Bash@3
    displayName: 'Auto-tag with SemVer'
    inputs:
      targetType: 'inline'
      script: |
        chmod +x scripts/auto-tag.sh

        # Check if this is a merge commit (PR completion)
        COMMIT_MSG=$(git log -1 --pretty=format:"%s")
        if ! echo "$COMMIT_MSG" | grep -qiE "^Merged PR|Merge pull request|\(#"; then
          echo "⚠️ Not a merge commit. Skipping auto-tag."
          exit 0
        fi

        # Run auto-tag
        OUTPUT=$(bash scripts/auto-tag.sh --apply --ci 2>&1)
        echo "$OUTPUT"
        NEW_TAG=$(echo "$OUTPUT" | grep -oP '(?<=TAG=)\S+')

        if [ -z "$NEW_TAG" ]; then
          echo "⚠️ No new tag created."
          exit 0
        fi

        echo "✅ Tag $NEW_TAG created and pushed"
        echo "##vso[task.setvariable variable=NEW_TAG]$NEW_TAG"
