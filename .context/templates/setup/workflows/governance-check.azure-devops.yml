# ============================================================================
# Governance Check on PR — Azure DevOps Pipelines
# ============================================================================
# Generated by Agent: SETUP | Framework: mi-AI-Factory
# Platform: Azure DevOps
#
# Runs the governance gates that must pass before a PR can merge to main:
#
#   - scripts/check-adr-constitution-sync.sh — single-source-of-truth
#     gate. Bypass via [adr-backfill] commit message marker.
#
# Wire this as a separate pipeline triggered by branch policies on `main`,
# or merge into an existing PR validation pipeline as a stage.
# ============================================================================

trigger: none

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

stages:
  - stage: Governance
    jobs:
      - job: GovernanceCheck
        steps:
          - checkout: self
            fetchDepth: 0

          - script: |
              git fetch origin "$(System.PullRequest.TargetBranch)"
            displayName: 'Fetch base branch'

          - script: |
              chmod +x scripts/check-adr-constitution-sync.sh
              bash scripts/check-adr-constitution-sync.sh "origin/$(System.PullRequest.TargetBranch)"
            displayName: 'ADR ↔ Constitution sync'
