# ============================================================================
# Governance Check on PR — GitHub Actions
# ============================================================================
# Generated by Agent: SETUP | Framework: myrmion-AI-factory
# Platform: GitHub Actions
#
# Runs the governance gates that must pass before a PR can merge to main:
#
#   - scripts/check-adr-constitution-sync.sh — single-source-of-truth
#     gate. Fails when an ADR transitions to status: accepted in the diff
#     without docs/constitution.md being modified in the same diff. Bypass
#     via [adr-backfill] commit message marker.
#
# Add additional governance gates as steps in the `governance-check` job
# below (project-specific manifest validation, license headers, etc.). Keep
# each gate as a separate step so failures attribute correctly.
# ============================================================================

name: Governance Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  governance-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      - name: ADR ↔ Constitution sync
        run: |
          chmod +x scripts/check-adr-constitution-sync.sh
          bash scripts/check-adr-constitution-sync.sh "origin/${{ github.base_ref }}"

      - name: Post violation comment on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body "## 🛑 Governance Check Failed

          One or more governance gates failed. See the workflow logs for the offending file(s).

          **Common causes:**

          - An ADR file transitioned to \`status: accepted\` without amending \`docs/constitution.md\` in the same PR.
            **Fix:** run the \`factory-adr-management\` Accept Procedure on each offending ADR — it amends constitution.md atomically and produces a single commit that passes the gate.
            **One-shot bypass (historical migration only):** include \`[adr-backfill]\` in any commit message in the PR.

          Run locally to verify: \`bash scripts/check-adr-constitution-sync.sh origin/main\`"
