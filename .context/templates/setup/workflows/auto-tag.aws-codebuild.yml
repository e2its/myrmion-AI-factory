# ============================================================================
# Auto-Tag on Merge to Main — AWS CodeBuild
# ============================================================================
# Generated by Agent: SETUP | Framework: myrmion-AI-factory
# Platform: AWS CodePipeline + CodeBuild
#
# Use as part of a CodePipeline triggered on pushes to main,
# or as a standalone CodeBuild project with webhook trigger.
# Calls scripts/auto-tag.sh for SemVer tagging.
#
# Required:
#   - CodeBuild service role with codecommit:GitPush or access to push
#     tags to your repo (GitHub/CodeCommit/Bitbucket via connection).
#   - If GitHub: store a Personal Access Token in Secrets Manager
#     and reference it as GITHUB_TOKEN env var.
#   - GIT_CREDENTIAL_HELPER env var set if using CodeCommit.
# ============================================================================

version: 0.2

env:
  git-credential-helper: yes
  secrets-manager:
    GITHUB_TOKEN: "auto-tag/github-token:token"  # Adjust ARN/path as needed

phases:
  install:
    runtime-versions:
      python: 3.11  # Minimal runtime; only git+bash needed
    commands:
      - echo "Installing dependencies..."
      - git fetch --unshallow 2>/dev/null || true
      - git fetch --tags

  pre_build:
    commands:
      - echo "Checking if merge commit..."
      - |
        COMMIT_MSG=$(git log -1 --pretty=format:"%s")
        if ! echo "$COMMIT_MSG" | grep -qiE "^Merge pull request|\(#"; then
          echo "⚠️ Not a merge commit. Skipping auto-tag."
          echo "SKIP_TAG=true" >> /tmp/build_env
        else
          echo "SKIP_TAG=false" >> /tmp/build_env
        fi

  build:
    commands:
      - |
        source /tmp/build_env
        if [ "$SKIP_TAG" = "true" ]; then
          echo "Skipping — not a merge commit."
          exit 0
        fi

        # Configure git for pushing tags
        git config user.name "codebuild-auto-tag"
        git config user.email "codebuild@noreply.amazonaws.com"

        # If using GitHub, configure token-based push
        if [ -n "$GITHUB_TOKEN" ]; then
          REPO_URL=$(git remote get-url origin | sed "s|https://|https://${GITHUB_TOKEN}@|")
          git remote set-url origin "$REPO_URL"
        fi

        chmod +x scripts/auto-tag.sh
        OUTPUT=$(bash scripts/auto-tag.sh --apply --ci 2>&1)
        echo "$OUTPUT"
        NEW_TAG=$(echo "$OUTPUT" | grep -oP '(?<=TAG=)\S+')

        if [ -n "$NEW_TAG" ]; then
          echo "✅ Tag $NEW_TAG created and pushed"
        fi

  post_build:
    commands:
      - echo "Auto-tag phase complete."

artifacts:
  files:
    - '**/*'
  discard-paths: no
