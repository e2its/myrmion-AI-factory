# ============================================================================
# Governance Check on PR — Bitbucket Pipelines
# ============================================================================
# Generated by Agent: SETUP | Framework: myrmion-AI-factory
# Platform: Bitbucket Pipelines
#
# Runs the governance gates that must pass before a PR can merge to main:
#
#   - scripts/check-adr-constitution-sync.sh — single-source-of-truth
#     gate. Bypass via [adr-backfill] commit message marker.
#
# To wire this into an existing bitbucket-pipelines.yml, merge the
# `pull-requests:` block under the existing `pipelines:` key.
# ============================================================================

image: alpine:3.20

pipelines:
  pull-requests:
    'main':
      - step:
          name: Governance Check
          caches:
            - apk
          script:
            - apk add --no-cache bash git python3
            - git fetch origin "$BITBUCKET_PR_DESTINATION_BRANCH"
            - chmod +x scripts/check-adr-constitution-sync.sh
            - bash scripts/check-adr-constitution-sync.sh "origin/$BITBUCKET_PR_DESTINATION_BRANCH"
