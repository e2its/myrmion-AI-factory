<!--
  CO-DESIGN FEATURE CONTENT TEMPLATE (Composition Mode)
  =====================================================
  This template is used when TEMPLATE_MODE == "COMPOSITION".
  It contains ONLY the feature-specific content that goes inside <main>.
  The shell (header, nav, footer, head, scripts) comes from the approved
  vision app_shell.html via template composition.

  Usage: /CODESIGN --start (when vision APPROVED) or /UX --mock (when vision APPROVED)
  
  Generated artifacts location: docs/spec/{{FEATURE_ID}}/mock.html
  (composed: vision app_shell.html shell + this content in FEATURE_CONTENT_SLOT)

  FRONTMATTER (embedded in the composed mock.html):
    status: DRAFT
    feature_id: {{FEATURE_ID}}
    vision_based: true
    vision_version: {{VISION_VERSION}}
    co_creation_round: 0
    po_sign_off: false
    ux_sign_off: false
    schemas_version: 1
    wcag_compliant: false

  RULES:
  - This template defines ONLY the content inside <main>
  - NO <html>, <head>, <header>, <footer>, or shell scripts
  - Uses the same CSS framework classes as the vision app_shell.html
  - Components should reference the vision's component_library.html
  - WCAG 2.1 AA compliance MANDATORY for all feature content
-->

    <!-- Page Title -->
    <h1 class="text-3xl md:text-4xl font-heading font-extrabold text-neutral-900 tracking-tight mb-2">{{PAGE_TITLE}}</h1>
    <p class="text-lg text-neutral-500 mb-10 max-w-2xl">{{PAGE_SUBTITLE}}</p>
    
    <!-- ========================================
         ALERT BANNER (Component from component_library.html)
         WCAG: role="alert", aria-live="assertive"
         ======================================== -->
    <div id="alert-banner" class="hidden mb-6" role="alert" aria-live="assertive">
      <div class="bg-semantic-success text-white p-4 rounded-md flex items-start gap-3">
        <svg class="w-5 h-5 flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
        </svg>
        <p id="alert-message" class="text-sm flex-1">{{MESSAGE}}</p>
        <button 
          type="button" 
          class="ml-auto hover:opacity-75 transition-fast" 
          data-close="alert-banner"
          aria-label="Close alert"
        >
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
          </svg>
        </button>
      </div>
    </div>
    
    <!-- ========================================
         CONTENT SECTION
         Layout: Agent selects from page_templates.html
         Visual DNA: shadow system, border-radius, hover elevation, transitions
         Components: Reuse from component_library.html when available
         
         AGENT INSTRUCTIONS:
         1. Select appropriate page template (dashboard, list, detail, form, error, empty)
         2. Populate with feature-specific content from spec.feature scenarios
         3. Reuse components from component_library.html (buttons, cards, forms, modals, tables)
         4. Add feature-specific interactions (modals, toggles) as inline <script> at bottom
         5. Ensure all interactive elements have data-testid attributes
         ======================================== -->
    <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 lg:gap-6">
      
      <!-- Card Component (from component_library.html) -->
      <article class="bg-white shadow-brand-sm rounded-brand-md p-6 
                      hover:shadow-brand-lg hover:-translate-y-0.5 
                      transition-all duration-300 border border-neutral-100 group"
               data-testid="feature-card-1">
        <div class="flex items-center gap-3 mb-4">
          <div class="w-10 h-10 rounded-brand-sm bg-primary/10 flex items-center justify-center">
            <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
            </svg>
          </div>
          <h2 class="text-lg font-heading font-semibold text-neutral-900 tracking-tight 
                     group-hover:text-primary transition-colors duration-200">{{CARD_TITLE}}</h2>
        </div>
        <p class="text-base text-neutral-600 leading-relaxed mb-5">{{CARD_DESCRIPTION}}</p>
        
        <!-- CTA Button (Touch target: 44px minimum) -->
        <a 
          href="#detail" 
          class="inline-flex items-center gap-1.5 bg-primary hover:bg-primary-dark text-white 
                 py-2.5 px-4 rounded-brand-sm shadow-brand-sm hover:shadow-brand-md 
                 transition-all duration-200 text-sm font-medium min-h-[44px]"
          data-testid="card-1-cta"
        >
          See more
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
          </svg>
        </a>
      </article>
      
    </section>
    
    <!-- ========================================
         FORM SECTION (if applicable per spec.feature)
         WCAG: Semantic HTML, ARIA labels, keyboard navigation
         ======================================== -->
    <section class="mt-16 max-w-md mx-auto bg-white shadow-brand-md rounded-brand-lg p-8 border border-neutral-100">
      <h2 class="text-xl font-heading font-bold text-neutral-900 tracking-tight mb-2">{{FORM_TITLE}}</h2>
      <p class="text-sm text-neutral-500 mb-6">{{FORM_SUBTITLE}}</p>
      
      <form id="main-form" class="space-y-5" novalidate data-testid="main-form">
        
        <!-- Text Input -->
        <div>
          <label for="input-field" class="block text-sm font-medium text-neutral-700 mb-1.5">
            {{LABEL_TEXT}}
            <span class="text-semantic-error" aria-label="required">*</span>
          </label>
          <input 
            type="text" 
            id="input-field" 
            name="input-field" 
            class="w-full px-4 py-2.5 border border-neutral-200 rounded-brand-sm 
                   bg-neutral-50/50 text-neutral-900 placeholder-neutral-400
                   focus:bg-white focus:border-primary focus:ring-2 focus:ring-primary/20 
                   focus:outline-none transition-all duration-200" 
            placeholder="{{PLACEHOLDER}}"
            aria-label="{{ARIA_LABEL}}"
            aria-required="true"
            aria-describedby="input-help"
            data-testid="input-field"
            required
          >
          <p id="input-help" class="text-xs text-neutral-500 mt-1.5">{{HELP_TEXT}}</p>
        </div>
        
        <!-- Submit Button (Touch target: 44px min height) -->
        <button 
          type="submit" 
          class="w-full bg-primary hover:bg-primary-dark text-white py-3 px-4 rounded-brand-sm 
                 shadow-brand-sm hover:shadow-brand-md transition-all duration-200 
                 font-medium disabled:opacity-50 disabled:cursor-not-allowed min-h-[44px]"
          data-testid="submit-button"
        >
          {{SUBMIT_LABEL}}
        </button>
        
      </form>
    </section>
    
    <!-- ========================================
         MODAL (Hidden by default — if needed by feature)
         WCAG: role="dialog", aria-modal="true", focus trap
         ======================================== -->
    <div 
      id="feature-modal" 
      class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4" 
      role="dialog" 
      aria-modal="true" 
      aria-labelledby="modal-title"
    >
      <div class="bg-white rounded-brand-lg p-8 max-w-md w-full shadow-brand-xl 
                  border border-neutral-100 transform transition-all duration-300">
        <div class="flex justify-between items-start mb-5">
          <h2 id="modal-title" class="text-xl font-heading font-bold text-neutral-900 tracking-tight">{{MODAL_TITLE}}</h2>
          <button 
            type="button" 
            class="text-neutral-400 hover:text-neutral-600 p-1 rounded-brand-sm hover:bg-neutral-100 transition-all duration-200" 
            data-close="feature-modal"
            aria-label="Close modal"
          >
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
            </svg>
          </button>
        </div>
        <div class="text-base text-neutral-600 leading-relaxed mb-8">
          <p>{{MODAL_CONTENT}}</p>
        </div>
        <div class="flex gap-3">
          <button 
            type="button" 
            class="flex-1 bg-primary hover:bg-primary-dark text-white py-2.5 px-4 rounded-brand-sm 
                   shadow-brand-sm hover:shadow-brand-md transition-all duration-200 font-medium min-h-[44px]"
            data-close="feature-modal"
            data-testid="modal-confirm"
          >
            Accept
          </button>
          <button 
            type="button" 
            class="flex-1 bg-white hover:bg-neutral-50 text-neutral-700 py-2.5 px-4 rounded-brand-sm 
                   border border-neutral-200 hover:border-neutral-300 shadow-brand-sm 
                   transition-all duration-200 font-medium min-h-[44px]"
            data-close="feature-modal"
            data-testid="modal-cancel"
          >
            Cancel
          </button>
        </div>
      </div>
    </div>
    
    <!-- ========================================
         FEATURE-SPECIFIC JS (< 20 lines)
         Only toggle states — NO business logic
         Modal/alert close handlers are in app_shell.html shell JS
         ======================================== -->
    <script>
      // Feature-specific modal toggle
      document.querySelectorAll('[data-toggle="modal"]').forEach(trigger => {
        trigger.addEventListener('click', (e) => {
          e.preventDefault();
          const targetId = trigger.getAttribute('data-target');
          const modal = document.getElementById(targetId);
          modal.classList.remove('hidden');
          const firstFocusable = modal.querySelector('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
          if (firstFocusable) firstFocusable.focus();
        });
      });
      
      // Feature-specific close handlers
      document.querySelectorAll('[data-close]').forEach(closeBtn => {
        closeBtn.addEventListener('click', () => {
          const targetId = closeBtn.getAttribute('data-close');
          document.getElementById(targetId)?.classList.add('hidden');
        });
      });
      
      // Form simulation (visual only — DEV implements real logic)
      document.getElementById('main-form')?.addEventListener('submit', (e) => {
        e.preventDefault();
        const alertBanner = document.getElementById('alert-banner');
        const alertMessage = document.getElementById('alert-message');
        if (alertBanner && alertMessage) {
          alertBanner.classList.remove('hidden');
          alertMessage.textContent = 'Form submitted successfully (simulated). DEV will implement the real API call.';
          alertBanner.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
      });
    </script>
