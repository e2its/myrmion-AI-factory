# ============================================================================
# Governance Check — CI Gate for Pull Requests
# ============================================================================
# Validates governance manifest consistency on every PR to main.
# Blocks merge if framework_core files changed without manifest update.
#
# Checks:
#   1. Drift: core files changed but manifest not updated
#   2. Orphan: new agent/instruction files not tracked
#   3. Stale: manifest entries pointing to deleted files
#   4. Version: MAJOR bump requires BREAKING CHANGE commit
# ============================================================================

name: Governance Check

on:
  pull_request:
    branches: [main]
    paths:
      - '.claude/commands/**'
      - '.claude/instructions/**'
      - '.claude/skills/**'
      - 'CLAUDE.md'
      - '.context/templates/**'
      - 'scripts/**'
      - '.context/templates/setup/governance_versions.json'
      - 'config/coherence-context.json'

permissions:
  contents: read
  pull-requests: write

jobs:
  governance-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      - name: Run governance validation
        run: |
          chmod +x scripts/validate-governance.sh
          bash scripts/validate-governance.sh --base "${{ github.base_ref }}"

      - name: ADR ↔ Constitution sync gate
        run: |
          chmod +x scripts/check-adr-constitution-sync.sh
          bash scripts/check-adr-constitution-sync.sh "origin/${{ github.base_ref }}"

      - name: Run T2 governance suite (templates + extraction + ADR accept + sync gate)
        run: |
          chmod +x scripts/test-templates-static.sh \
                   scripts/test-snapshot-extraction.sh \
                   scripts/test-adr-accept.sh \
                   scripts/test-check-adr-constitution-sync.sh
          set -e
          for t in scripts/test-templates-static.sh \
                   scripts/test-snapshot-extraction.sh \
                   scripts/test-adr-accept.sh \
                   scripts/test-check-adr-constitution-sync.sh; do
            echo "════════ Running $t ════════"
            bash "$t"
          done

      - name: Codebase inventory drift (advisory)
        run: |
          chmod +x scripts/check-inventory-drift.sh
          bash scripts/check-inventory-drift.sh --warn-only

      - name: Applicability frontmatter validation (ADP)
        run: |
          chmod +x scripts/check-applicability-frontmatter.sh
          bash scripts/check-applicability-frontmatter.sh

      - name: Post violation comment on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body "## 🛑 Governance Check Failed

          One or more governance gates failed. Common causes:

          1. **Manifest drift** — framework core files modified but \`governance_versions.json\` was not updated.
             Update \`.context/templates/setup/governance_versions.json\` (bump \`framework_version\` and the relevant \`framework_core\` / \`templates\` entries). MAJOR bumps require \`BREAKING CHANGE:\` in commit body or \`feat!:\` prefix.

          2. **ADR ↔ Constitution sync** — an ADR file transitioned to \`status: accepted\` without amending \`docs/constitution.md\` in the same diff.
             Run the \`Factory-adr-management\` Accept Procedure on each offending ADR (it amends constitution.md atomically). One-shot bypass for historical migration: include \`[adr-backfill]\` in any commit message.

          3. **T2 governance suite** — one of the static template / extraction / ADR-accept / sync-gate tests failed.
             Run locally: \`bash scripts/test-templates-static.sh\` (and the other three). Each test is self-contained and prints the failing assertion.

          Run all checks locally: \`./scripts/validate-governance.sh --base main && ./scripts/check-adr-constitution-sync.sh origin/main && for t in scripts/test-*.sh; do bash \"\$t\" || break; done\`"
